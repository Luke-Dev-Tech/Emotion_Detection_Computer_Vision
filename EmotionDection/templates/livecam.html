<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura — Live Detection</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg-deep: #09090b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #d946ef;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        nav {
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            border-bottom: 1px solid var(--border);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }

        .viewport-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        #video {
            display: block;
            width: 100%;
            height: auto;
            max-height: 75vh;
            object-fit: contain;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 2;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media(max-width: 600px) {
            nav {
                padding: 1rem;
            }

            .nav-links {
                display: none;
            }

            .viewport-container {
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">
            <div class="logo-dot"></div> AURA
        </a>
        <ul class="nav-links">
            <li><a href="/">Static Analysis</a></li>
            <li><a href="/livecam">Live Detection</a></li>
        </ul>
    </nav>

    <main>
        <div class="viewport-container">
            <div class="status-bar">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Initializing Camera...</span>
            </div>
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlayCanvas"></canvas>
        </div>

        <div class="controls">
            <a href="/" class="btn">← Back to Upload</a>
            <button class="btn" id="flipBtn">Flip Camera</button>
        </div>
    </main>

    <script>
        const video = document.getElementById("video");
        const overlay = document.getElementById("overlayCanvas");
        const ctx = overlay.getContext("2d");
        const statusText = document.getElementById("statusText");
        const flipBtn = document.getElementById("flipBtn");

        let stream = null;
        let currentFacing = "user";
        let isProcessing = false;
        let lastSent = 0;
        const SEND_INTERVAL = 150; // ms between requests

        async function startCamera(facing = "user") {
            if (stream) stream.getTracks().forEach(t => t.stop());

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    statusText.textContent = "Live Stream Active";
                    startDetectionLoop();
                };
            } catch (err) {
                statusText.textContent = "Camera Access Denied";
                document.getElementById("statusDot").style.background = "#ef4444";
                document.getElementById("statusDot").style.boxShadow = "none";
            }
        }

        flipBtn.addEventListener("click", () => {
            currentFacing = currentFacing === "user" ? "environment" : "user";
            startCamera(currentFacing);
        });

        const captureCanvas = document.createElement("canvas");

        async function sendFrame() {
            if (!video.videoWidth) return;

            captureCanvas.width = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            captureCanvas.getContext("2d").drawImage(video, 0, 0);

            const blob = await new Promise(res => captureCanvas.toBlob(res, "image/jpeg", 0.85));
            const formData = new FormData();
            formData.append("image", blob, "frame.jpg");

            try {
                const response = await fetch("/predict", { method: "POST", body: formData });
                const data = await response.json();

                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                // Dynamic sizing based on display size to make sure lines aren't too thin
                const renderScale = (video.getBoundingClientRect().width || overlay.width) / overlay.width;
                const strokePx = Math.max(2, 4 / renderScale);
                const fontPx = Math.max(12, Math.round(16 / renderScale));

                data.boxes.forEach(box => {
                    const { x1, y1, x2, y2, emotion, confidence, color } = box;
                    const w = x2 - x1;
                    const h = y2 - y1;

                    // Box
                    ctx.strokeStyle = color || "#fff";
                    ctx.lineWidth = strokePx;
                    ctx.strokeRect(x1, y1, w, h);

                    // Label
                    const text = `${emotion} ${confidence}%`;
                    ctx.font = `bold ${fontPx}px Inter`;
                    const textW = ctx.measureText(text).width;
                    const pad = 6 / renderScale;

                    // Background pill
                    ctx.fillStyle = "rgba(0,0,0,0.7)";
                    const pillY = y1 > fontPx + 10 ? y1 - fontPx - pad * 2 : y1 + h;
                    ctx.fillRect(x1, pillY, textW + pad * 2, fontPx + pad * 2);

                    // Text
                    ctx.fillStyle = color || "#fff";
                    ctx.fillText(text, x1 + pad, pillY + fontPx + pad * 0.5);
                });
            } catch (e) {
                console.error("Inference Error:", e);
            }
        }

        function startDetectionLoop() {
            async function loop() {
                const now = Date.now();
                if (!isProcessing && now - lastSent > SEND_INTERVAL) {
                    isProcessing = true;
                    await sendFrame();
                    isProcessing = false;
                    lastSent = now;
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

        // Init
        startCamera();
    </script>
</body>

</html>
